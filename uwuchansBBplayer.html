<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteBeat Player</title>
    <style>
        :root {
            --bg-main: #121214;
            --bg-panel: #1a1a1e;
            --bg-input: #222226;
            --accent: #d9006a;
            --accent-hover: #ff007f;
            --text-main: #e0e0e6;
            --text-muted: #8e8e93;
            --border: #2a2a32;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            color: var(--accent);
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .player-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
        }

        canvas {
            background: #09090b;
            border: 1px solid var(--border);
            width: 100%;
            height: 150px;
            margin-bottom: 20px;
            display: block;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .value-display {
            color: var(--accent);
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            outline: none;
            margin-top: 10px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: var(--accent-hover);
        }

        select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--accent);
        }

        textarea {
            width: 100%;
            height: 140px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: #d9006a;
            font-family: "Consolas", "Monaco", "Courier New", monospace;
            font-size: 14px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 20px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .button-pane {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button, .file-label {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        button:hover, .file-label:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
        }

        .btn-main {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-main:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        input[type="file"] {
            display: none;
        }

        .library {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .library-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .track-item {
            background: var(--bg-input);
            padding: 8px 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .track-item:hover {
            border-color: var(--accent);
        }

        .track-author {
            color: var(--accent);
            font-weight: bold;
        }

        .statusbar {
            margin-top: 15px;
            font-size: 12px;
            font-family: monospace;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 10px;
            width: 100%;
        }

        /* Кастомный скроллбар для библиотеки */
        .library::-webkit-scrollbar { width: 8px; }
        .library::-webkit-scrollbar-track { background: var(--bg-panel); }
        .library::-webkit-scrollbar-thumb { background: var(--border); }
        .library::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <h1>ByteBeat Player</h1>
    <div class="subtitle">Procedural Audio Generator</div>

    <div class="player-container">
        <canvas id="visualizer" width="760" height="150"></canvas>

        <div class="controls-grid">
            <div class="control-group">
                <label for="hz">Sample Rate</label>
                <select id="hz">
                    <option value="4000">4000 Hz</option>
                    <option value="8000" selected>8000 Hz</option>
                    <option value="11025">11025 Hz</option>
                    <option value="16000">16000 Hz</option>
                    <option value="22050">22050 Hz</option>
                    <option value="32000">32000 Hz</option>
                    <option value="44100">44100 Hz</option>
                    <option value="48000">48000 Hz</option>
                </select>
            </div>

            <div class="control-group">
                <label for="vis-mode">Visualizer</label>
                <select id="vis-mode">
                    <option value="line">Waveform</option>
                    <option value="points">Points</option>
                </select>
            </div>

            <div class="control-group">
                <label for="mode">Audio Mode</label>
                <select id="mode">
                    <option value="bytebeat">ByteBeat (8-bit)</option>
                    <option value="signed">Signed ByteBeat</option>
                    <option value="floatbeat">Floatbeat (-1.0 to 1.0)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="volume">Volume: <span id="vol-val" class="value-display">50</span>%</label>
                <input type="range" id="volume" min="0" max="100" value="50">
            </div>
        </div>

        <textarea id="code" spellcheck="false" placeholder="Loading library from Dollchan..."></textarea>

        <div class="button-pane">
            <button class="btn-main" id="play-btn" onclick="togglePlay()">Play ▶</button>
            <button onclick="exportCode('uwuq')">Export .uwuq</button>
            <button onclick="exportCode('txt')">Export .txt</button>
            
            <label class="file-label">
                Import File
                <input type="file" id="file-input" accept=".uwuq,.txt" onchange="importCode(event)">
            </label>
        </div>

        <div class="library">
            <div class="library-title">
                <span>Track Library (Dollchan)</span>
                <span id="lib-count">Loading...</span>
            </div>
            <div class="track-list" id="track-list"></div>
        </div>

        <div class="statusbar" id="status">Status: Initializing...</div>
    </div>

    <script>
        let audioCtx;
        let scriptNode;
        let analyser;
        let gainNode;
        let isPlaying = false;
        let currentT = 0; 
        let animationId;
        let libraryData = [];

        const playBtn = document.getElementById('play-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const trackListElement = document.getElementById('track-list');

        document.getElementById('volume').oninput = (e) => {
            document.getElementById('vol-val').innerText = e.target.value;
            if(gainNode) gainNode.gain.value = e.target.value / 100;
        };

        function togglePlay() {
            if (isPlaying) {
                stopAudio();
            } else {
                startAudio();
            }
        }

        function startAudio() {
            if (audioCtx) audioCtx.close();
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;

            gainNode = audioCtx.createGain();
            gainNode.gain.value = document.getElementById('volume').value / 100;

            scriptNode = audioCtx.createScriptProcessor(4096, 0, 1);
            
            scriptNode.onaudioprocess = function(e) {
                let channelData = e.outputBuffer.getChannelData(0);
                let codeStr = document.getElementById('code').value;
                let sampleRate = parseInt(document.getElementById('hz').value);
                let mode = document.getElementById('mode').value;
                
                let step = sampleRate / audioCtx.sampleRate;

                let func;
                try {
                    func = new Function('t', `return ${codeStr};`);
                } catch(err) {
                    func = function() { return 0; };
                }

                for (let i = 0; i < channelData.length; i++) {
                    let val = 0;
                    try {
                        let raw = func(Math.floor(currentT));
                        
                        if (mode === 'bytebeat') {
                            val = (raw & 255) / 128 - 1;
                        } else if (mode === 'signed') {
                            val = ((raw + 128) & 255) / 128 - 1;
                        } else if (mode === 'floatbeat') {
                            val = raw;
                        }
                    } catch(err) {}
                    
                    if(val > 1) val = 1;
                    if(val < -1) val = -1;

                    channelData[i] = val;
                    currentT += step;
                }
            };

            scriptNode.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            isPlaying = true;
            playBtn.innerHTML = "Stop ■";
            status.innerText = "Status: Playing";
            drawVisualizer();
        }

        function stopAudio() {
            if (audioCtx) {
                audioCtx.close();
            }
            isPlaying = false;
            playBtn.innerHTML = "Play ▶";
            status.innerText = "Status: Stopped";
            cancelAnimationFrame(animationId);
            
            canvasCtx.fillStyle = '#09090b';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawVisualizer() {
            if (!isPlaying) return;
            animationId = requestAnimationFrame(drawVisualizer);

            let bufferLength = analyser.frequencyBinCount;
            let dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);
            let visMode = document.getElementById('vis-mode').value;

            canvasCtx.fillStyle = '#09090b';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#d9006a';
            canvasCtx.fillStyle = '#d9006a';

            let sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            if (visMode === 'line') {
                canvasCtx.beginPath();
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0;
                    let y = v * canvas.height / 2;
                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();
            } else if (visMode === 'points') {
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0;
                    let y = v * canvas.height / 2;
                    canvasCtx.fillRect(x, y, 2, 2);
                    x += sliceWidth;
                }
            }
        }

        canvasCtx.fillStyle = '#09090b';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        function exportCode(ext) {
            let code = document.getElementById('code').value;
            let blob = new Blob([code], {type: "text/plain"});
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `track.${ext}`;
            a.click();
            status.innerText = `Status: Exported to .${ext}`;
        }

        function importCode(event) {
            let file = event.target.files[0];
            if (!file) return;

            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('code').value = e.target.result;
                status.innerText = `Status: Loaded ${file.name}`;
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // Загрузка выбранного трека из списка
        function loadTrack(index) {
            let track = libraryData[index];
            document.getElementById('code').value = track.code || track.url || '';
            
            if (track.sampleRate) {
                let hzSelect = document.getElementById('hz');
                let exists = Array.from(hzSelect.options).some(opt => opt.value == track.sampleRate);
                if(exists) hzSelect.value = track.sampleRate;
            }
            
            if (track.mode) {
                let m = track.mode.toLowerCase();
                let modeSelect = document.getElementById('mode');
                if (m.includes('float')) modeSelect.value = 'floatbeat';
                else if (m.includes('signed') || m === 'signed bytebeat') modeSelect.value = 'signed';
                else modeSelect.value = 'bytebeat';
            }

            status.innerText = `Status: Loaded "${track.name}" by ${track.author || 'Anon'}`;
            if (isPlaying) startAudio();
        }

        // Магия: скачиваем базу прямо с репозитория Dollchan
        async function fetchDollchanLibrary() {
            status.innerText = "Status: Fetching library from Dollchan repo...";
            try {
                // Берем оригинальный архив classic.gz
                const response = await fetch('https://raw.githubusercontent.com/SthephanShinkufag/bytebeat-composer/master/data/library/classic.gz');
                if (!response.ok) throw new Error('Network error');

                // Распаковываем gzip прямо в браузере
                const ds = new DecompressionStream('gzip');
                const decompressedStream = response.body.pipeThrough(ds);
                const text = await new Response(decompressedStream).text();
                
                libraryData = JSON.parse(text);
                document.getElementById('lib-count').innerText = `${libraryData.length} tracks`;
                
                trackListElement.innerHTML = '';
                libraryData.forEach((track, index) => {
                    let div = document.createElement('div');
                    div.className = 'track-item';
                    div.innerHTML = `<span><span class="track-author">${track.author || 'Anon'}</span> - ${track.name || 'Untitled'}</span> <span>${track.sampleRate || 8000}Hz</span>`;
                    div.onclick = () => loadTrack(index);
                    trackListElement.appendChild(div);
                });

                if(libraryData.length > 0) {
                    loadTrack(0);
                    status.innerText = "Status: Library loaded successfully.";
                }

            } catch (err) {
                console.error(err);
                status.innerText = "Status: Failed to fetch library. Using fallback code.";
                document.getElementById('code').value = "t * (42 & t >> 10)";
            }
        }

        window.onload = fetchDollchanLibrary;
    </script>
</body>
</html>
